---
- name: Ensure Jenkins plugins directory exists
  ansible.builtin.file:
    path: /var/lib/jenkins/plugins
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0755"

- name: Download Jenkins plugin manager tool
  ansible.builtin.get_url:
    url: https://github.com/jenkinsci/plugin-installation-manager-tool/releases/download/2.14.0/jenkins-plugin-manager-2.14.0.jar
    dest: /usr/local/lib/jenkins-plugin-manager.jar
    owner: root
    group: root
    mode: "0644"

- name: Remove manually managed Jenkins OIDC/JCasC plugins
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/jenkins/plugins/oic-auth.jpi
    - /var/lib/jenkins/plugins/oic-auth.hpi
    - /var/lib/jenkins/plugins/configuration-as-code.jpi
    - /var/lib/jenkins/plugins/configuration-as-code.hpi
    - /var/lib/jenkins/plugins/commons-text-api.jpi
    - /var/lib/jenkins/plugins/commons-text-api.hpi
  notify: Restart Jenkins

- name: Install Jenkins OIDC/JCasC plugins with dependency resolution
  ansible.builtin.command: >
    java -jar /usr/local/lib/jenkins-plugin-manager.jar
    --war /usr/share/java/jenkins.war
    --plugin-download-directory /var/lib/jenkins/plugins
    --plugins "configuration-as-code oic-auth"
  register: jenkins_plugin_install
  changed_when: >
    'Done' in (jenkins_plugin_install.stdout | default('')) or
    'Installed plugin' in (jenkins_plugin_install.stdout | default(''))
  notify: Restart Jenkins

- name: Ensure Jenkins plugins ownership
  ansible.builtin.file:
    path: /var/lib/jenkins/plugins
    state: directory
    recurse: true
    owner: jenkins
    group: jenkins

- name: Ensure Jenkins JCasC directory exists
  ansible.builtin.file:
    path: /var/lib/jenkins/casc_configs
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0755"

- name: Render Jenkins OIDC JCasC config
  ansible.builtin.template:
    src: jenkins-oidc.yaml.j2
    dest: /var/lib/jenkins/casc_configs/jenkins-oidc.yaml
    owner: jenkins
    group: jenkins
    mode: "0600"
  notify: Restart Jenkins

- name: Ensure systemd override directory for Jenkins exists
  ansible.builtin.file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure Jenkins CASC_JENKINS_CONFIG via systemd override
  ansible.builtin.copy:
    dest: /etc/systemd/system/jenkins.service.d/casc.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      Environment="CASC_JENKINS_CONFIG=/var/lib/jenkins/casc_configs/jenkins-oidc.yaml"
  notify:
    - Reload systemd
    - Restart Jenkins