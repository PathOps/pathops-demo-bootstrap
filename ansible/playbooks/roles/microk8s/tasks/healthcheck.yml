---
- name: Apply whoami health (deployment/service/ingress)
  ansible.builtin.shell: |
    set -euo pipefail
    cat <<'YAML' | /snap/bin/microk8s kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: whoami-health
      namespace: default
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: whoami-health
      template:
        metadata:
          labels:
            app: whoami-health
        spec:
          containers:
            - name: whoami
              image: traefik/whoami:latest
              ports:
                - containerPort: 80
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: whoami-health
      namespace: default
    spec:
      selector:
        app: whoami-health
      ports:
        - name: http
          port: 80
          targetPort: 80
    ---
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: whoami-health
      namespace: default
    spec:
      ingressClassName: public
      rules:
        - host: {{ health_host }}
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: whoami-health
                    port:
                      number: 80
    YAML
  args:
    executable: /bin/bash
  when: health_host is defined and (health_host | length > 0)
  changed_when: >
    'created' in (whoami_apply.stdout | lower) or
    'configured' in (whoami_apply.stdout | lower)
  register: whoami_apply